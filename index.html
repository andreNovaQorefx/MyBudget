<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MyBudget</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1F8A5B" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MyBudget" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<style>
/* ===== Oggi · Design Tokens =====
   Editoriale "green finance" — Cash App / Revolut energy on Android. */

:root {
  /* Greens */
  --green-50:  oklch(0.97 0.02 155);
  --green-100: oklch(0.93 0.05 155);
  --green-200: oklch(0.86 0.09 155);
  --green-400: oklch(0.72 0.14 155);
  --green-500: oklch(0.62 0.15 155);
  --green-600: oklch(0.52 0.13 155);
  --green-700: oklch(0.42 0.10 155);
  --green-900: oklch(0.22 0.05 155);

  /* Neutrals (warm-cool balanced) */
  --ink:       #0E1410;
  --ink-2:     #1B2520;
  --ink-3:     #2E3A34;
  --mute:      #6F7A73;
  --mute-2:    #98A29B;
  --line:      #E6E8E4;
  --line-2:    #EFF1ED;
  --paper:     #F7F8F5;
  --paper-2:   #FBFBF8;
  --card:      #FFFFFF;

  /* Semantic */
  --good:      oklch(0.62 0.15 155);
  --bad:       oklch(0.60 0.20 28);
  --bad-soft:  oklch(0.94 0.04 28);
  --warn:      oklch(0.78 0.14 78);
  --accent-yellow: oklch(0.86 0.16 92);

  /* Motion / shape */
  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;
  --r-pill: 999px;

  --shadow-sm: 0 1px 0 rgba(14,20,16,.04), 0 1px 2px rgba(14,20,16,.04);
  --shadow-md: 0 2px 6px rgba(14,20,16,.05), 0 12px 32px -8px rgba(14,20,16,.10);
  --shadow-lg: 0 20px 60px -16px rgba(14,20,16,.18);

  --ease-out-quart: cubic-bezier(.22,1,.36,1);
  --ease-spring:    cubic-bezier(.34,1.56,.64,1);
}

/* ===== Reset for the canvas page only ===== */
html, body { margin: 0; padding: 0; background: #EDECE5; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
* { box-sizing: border-box; }

/* ===== Shared inside-device styles =====
   Scoped via .oggi prefix to keep them isolated from the canvas chrome. */
.oggi {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.4;
  letter-spacing: -0.005em;
}
.oggi .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
.oggi .eyebrow {
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mute); font-weight: 600;
}
.oggi .display {
  font-weight: 700; letter-spacing: -0.045em; line-height: 0.95;
  font-variant-numeric: tabular-nums;
}
.oggi .h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.oggi .h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; }
.oggi .meta { font-size: 12px; color: var(--mute); }

/* Pull-to-refresh indicator (shown in variant A as static demo) */
.oggi .ptr {
  position: absolute; top: -56px; left: 50%; transform: translateX(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--card); box-shadow: var(--shadow-md);
  display: grid; place-items: center;
}
.oggi .ptr svg { animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Generic press feedback */
.oggi .press { transition: transform .12s var(--ease-out-quart), background .15s ease; }
.oggi .press:active { transform: scale(0.97); }

/* Number count-up animation (CSS-only via @property) */
@property --num { syntax: '<number>'; inherits: false; initial-value: 0; }
@property --ring { syntax: '<number>'; inherits: false; initial-value: 0; }

/* Bottom nav (shared across variants) */
.oggi .nav {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line);
  background: var(--card);
}
.oggi .nav .nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0 12px; gap: 3px;
  color: var(--mute-2); font-size: 11px; font-weight: 600;
}
.oggi .nav .nav-item.active { color: var(--green-600); }
.oggi .nav .nav-item svg { width: 22px; height: 22px; }

/* Tap-feedback ripple (haptic-style visual) */
.oggi .tap { position: relative; overflow: hidden; }
.oggi .tap::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,0,0,.06) 0%, transparent 40%);
  opacity: 0; transition: opacity .35s var(--ease-out-quart);
}
.oggi .tap.flash::after { opacity: 1; transition-duration: 0s; }

/* Soft entry animations */
@keyframes rise {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.oggi .rise   { animation: rise .55s var(--ease-out-quart) both; }
.oggi .rise-1 { animation-delay: .04s; }
.oggi .rise-2 { animation-delay: .10s; }
.oggi .rise-3 { animation-delay: .18s; }
.oggi .rise-4 { animation-delay: .26s; }
.oggi .rise-5 { animation-delay: .34s; }

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  .oggi * { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition: none !important; }
}

/* ===== Production app shell overrides ===== */
html, body { margin:0; padding:0; background: var(--paper-2); }
#root { min-height:100dvh; background: var(--paper-2);
  padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
.oggi { height:auto !important; min-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom)); }
/* Anti-blank: se le animazioni d’entrata non partono, il contenuto resta visibile */
.oggi .rise { animation-fill-mode: forwards; }
/* ===== Splash / schermata di benvenuto ===== */
#splash{ position:fixed; inset:0; z-index:9999; background:#1F8A5B; color:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
  transition: opacity .55s ease; }
#splash.hide{ opacity:0; pointer-events:none; }
#splash .lockup{ display:flex; flex-direction:column; align-items:center; gap:18px;
  animation: splashPop .7s var(--ease-spring) forwards; }
#splash .name{ font-size:26px; font-weight:700; letter-spacing:-0.02em; }
#splash .from{ position:absolute; left:0; right:0; bottom: calc(env(safe-area-inset-bottom) + 44px);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  animation: splashFade .8s ease .35s forwards; }
#splash .from .lbl{ font-size:12px; letter-spacing:0.12em; text-transform:uppercase; opacity:.72; }
/* PLACEHOLDER logo del creatore — sostituire lo slot con il logo reale quando pronto */
#splash .from .slot{ font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:12px;
  padding:7px 14px; border:1px dashed rgba(255,255,255,.45); border-radius:10px;
  color:rgba(255,255,255,.8);
  background:repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 6px, transparent 6px 12px); }
@keyframes splashPop{ from{opacity:0; transform:scale(.82)} to{opacity:1; transform:scale(1)} }
@keyframes splashFade{ from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<!-- ===== SPLASH (sostituire il mark e lo slot con il logo reale quando disponibile) ===== -->

    <svg width="92" height="92" viewBox="0 0 92 92" aria-hidden="true"><circle cx="46" cy="46" r="30" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="7"/><circle cx="46" cy="46" r="30" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-dasharray="117 71" transform="rotate(-90 46 46)"/><text x="46" y="47" text-anchor="middle" dominant-baseline="central" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="30" fill="#fff">€</text></svg>
    <div class="name">MyBudget</div>
  </div>
  <div class="from">
    <div class="lbl">creato da</div>
    <div class="slot">il tuo logo qui</div>
  </div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
/* global React */

// ─────────────────────────────────────────────────────────────
// Shared building blocks for the "Oggi" mockup variants.
// All variants share: top bar, bottom nav, week data, and motion helpers.
// ─────────────────────────────────────────────────────────────

const WEEK = [
  { d: 'L', spent: 18.20, budget: 25 },
  { d: 'M', spent: 22.80, budget: 25 },
  { d: 'M', spent:  9.50, budget: 25 },
  { d: 'G', spent: 14.10, budget: 25 },
  { d: 'V', spent: 12.60, budget: 25, today: true },
  { d: 'S', spent:  0,    budget: 25, future: true },
  { d: 'D', spent:  0,    budget: 25, future: true },
];

const TODAY_EXPENSES = [
  { id: 1, amt: 4.20, note: 'Caffè e cornetto', cat: '☕' },
  { id: 2, amt: 6.80, note: 'Pranzo veloce',   cat: '🥗' },
  { id: 3, amt: 1.60, note: 'Metro',           cat: '🚇' },
];

const fmt = (n, opts = {}) => {
  const { sign = false, decimals = 2 } = opts;
  const s = (sign && n > 0 ? '+' : '') + n.toLocaleString('it-IT', {
    minimumFractionDigits: decimals, maximumFractionDigits: decimals,
  });
  return s;
};

// ─────────────────────────────────────────────────────────────
// Greeting top bar — same shape across variants.
// onDark=true switches to inverted scheme for variant D's dark hero.
// ─────────────────────────────────────────────────────────────
function TopBar({ onDark = false, date = 'Mer · 21 mag', name = 'Marco', tone = 'light' }) {
  const color = onDark ? 'rgba(255,255,255,.75)' : 'var(--mute)';
  const text  = onDark ? '#fff' : 'var(--ink)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '14px 20px 10px',
    }}>
      <div>
        <div className="eyebrow" style={{ color, marginBottom: 4 }}>{date}</div>
        <div style={{ fontSize: 18, fontWeight: 700, color: text, letterSpacing: '-0.015em' }}>
          Ciao, {name}
        </div>
      </div>
      <div style={{
        width: 38, height: 38, borderRadius: '50%',
        background: onDark ? 'rgba(255,255,255,.12)' : 'var(--paper)',
        display: 'grid', placeItems: 'center',
        border: onDark ? '1px solid rgba(255,255,255,.15)' : '1px solid var(--line)',
      }} className="press">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke={onDark ? '#fff' : 'var(--ink)'} strokeWidth="1.8" strokeLinecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.41.18.74.51.93.93"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Bottom tab nav — sticky at end of children area, above device nav bar.
// ─────────────────────────────────────────────────────────────
function BottomNav() {
  const items = [
    { id: 'oggi', label: 'Oggi', active: true, icon: (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round">
        <path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-8.5Z"/>
      </svg>
    )},
    { id: 'diario', label: 'Diario', icon: (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round">
        <path d="M5 4h11a3 3 0 0 1 3 3v13a1 1 0 0 1-1.5.87L13 18.6l-4.5 2.27A1 1 0 0 1 7 20V6a2 2 0 0 1 2-2Z"/>
      </svg>
    )},
    { id: 'settimane', label: 'Settimane', icon: (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <rect x="3" y="5" width="18" height="16" rx="2" /><path d="M3 9h18M8 3v4M16 3v4"/>
      </svg>
    )},
    { id: 'altro', label: 'Altro', icon: (
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
    )},
  ];
  return (
    <nav className="nav">
      {items.map(it => (
        <div key={it.id} className={'nav-item press' + (it.active ? ' active' : '')}>
          {it.icon}
          <span>{it.label}</span>
        </div>
      ))}
    </nav>
  );
}

// ─────────────────────────────────────────────────────────────
// FAB shared for all variants — large add-expense action
// ─────────────────────────────────────────────────────────────
function FabAdd({ label = 'Aggiungi spesa', tone = 'green' }) {
  const bg = tone === 'green' ? 'var(--green-500)' : 'var(--ink)';
  return (
    <button className="press tap" onClick={tapFlash} style={{
      width: '100%', height: 56, borderRadius: 18,
      background: bg, color: '#fff',
      border: 0, fontSize: 16, fontWeight: 600, letterSpacing: '-0.005em',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10,
      boxShadow: '0 14px 30px -10px ' + (tone === 'green' ? 'oklch(0.62 0.15 155 / 0.5)' : 'rgba(0,0,0,.3)'),
    }}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      {label}
    </button>
  );
}

// Tap-flash micro-interaction (visual haptic)
function tapFlash(e) {
  const el = e.currentTarget;
  const r = el.getBoundingClientRect();
  el.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
  el.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 380);
}

// ─────────────────────────────────────────────────────────────
// Expense list row — small, refined
// ─────────────────────────────────────────────────────────────
function ExpenseRow({ e }) {
  return (
    <div className="press tap" onClick={tapFlash} style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '12px 4px',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 12, background: 'var(--green-50)',
        display: 'grid', placeItems: 'center', fontSize: 18,
      }}>{e.cat}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.01em' }}>{e.note}</div>
        <div className="meta" style={{ marginTop: 2 }}>oggi · contante</div>
      </div>
      <div className="tnum" style={{ fontWeight: 700, fontSize: 15 }}>{fmt(e.amt)} €</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Status pill — sotto/sopra budget chip
// ─────────────────────────────────────────────────────────────
function StatusPill({ tone = 'good', children, dark = false }) {
  const map = {
    good: { bg: dark ? 'rgba(34,197,94,.16)' : 'var(--green-100)', fg: dark ? 'oklch(0.86 0.16 155)' : 'var(--green-700)', dot: 'var(--green-500)' },
    bad:  { bg: 'var(--bad-soft)', fg: 'var(--bad)', dot: 'var(--bad)' },
    warn: { bg: 'oklch(0.96 0.06 90)', fg: 'oklch(0.45 0.10 60)', dot: 'var(--warn)' },
  };
  const t = map[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '4px 10px 4px 8px', borderRadius: 999,
      background: t.bg, color: t.fg,
      fontSize: 11.5, fontWeight: 700, letterSpacing: '0.01em',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: t.dot, display: 'inline-block' }} />
      {children}
    </span>
  );
}

// ─────────────────────────────────────────────────────────────
// Pull-to-refresh indicator (decorative — shown as if mid-pull)
// ─────────────────────────────────────────────────────────────
function PTR({ tone = 'light' }) {
  const fg = tone === 'light' ? 'var(--green-500)' : '#fff';
  const bg = tone === 'light' ? '#fff' : 'rgba(255,255,255,.16)';
  return (
    <div style={{
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      height: 28, marginTop: -6, marginBottom: 2, opacity: .9,
    }}>
      <div style={{
        width: 26, height: 26, borderRadius: 999, background: bg,
        display: 'grid', placeItems: 'center',
        boxShadow: tone === 'light' ? '0 4px 12px rgba(14,20,16,.10)' : 'none',
      }}>
        <svg width="14" height="14" viewBox="0 0 24 24" style={{ animation: 'spin 1.4s linear infinite' }}>
          <circle cx="12" cy="12" r="9" fill="none" stroke={fg} strokeWidth="2.6" strokeLinecap="round"
                  strokeDasharray="14 50" />
        </svg>
      </div>
    </div>
  );
}

Object.assign(window, {
  WEEK, TODAY_EXPENSES, fmt,
  TopBar, BottomNav, FabAdd, tapFlash,
  ExpenseRow, StatusPill, PTR,
});

</script>
<script type="text/babel">
/* global React, WEEK, TODAY_EXPENSES, fmt,
   TopBar, BottomNav, FabAdd, tapFlash,
   ExpenseRow, StatusPill, PTR */

// ─────────────────────────────────────────────────────────────
// Variant A · "Editoriale Verde"
// Cash App / Revolut energy. Hero = weekly position (huge number),
// classic ring secondary, animated stroke-dashoffset fill + count-up.
// ─────────────────────────────────────────────────────────────

function VariantA() {
  // Day budget arithmetic
  const dayBudget = 25;
  const daySpent  = 12.60;
  const dayLeft   = dayBudget - daySpent;
  const pct       = daySpent / dayBudget;
  const weekDelta = 24.80;     // positive = under budget
  const weekBudget = 175;
  const weekSpent  = weekBudget - weekDelta - 47.80 /* still future days */;
  // ↑ illustrative only — number on screen is the headline +24,80 €

  // Ring math
  const R = 56;
  const C = 2 * Math.PI * R;
  const offset = C * (1 - pct);

  return (
    <div className="oggi" style={{
      background: 'var(--paper-2)', height: '100%', display: 'flex', flexDirection: 'column',
    }}>
      {/* Pull-to-refresh in-progress (decorative) */}
      <PTR />

      <TopBar date="Mer · 21 mag" />

      {/* HERO — settimanale */}
      <section className="rise rise-1" style={{ padding: '6px 20px 18px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
          <span className="eyebrow">Questa settimana</span>
          <StatusPill tone="good">Sotto budget</StatusPill>
        </div>

        <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
          <span style={{
            fontSize: 14, fontWeight: 700, color: 'var(--green-600)',
            letterSpacing: '-0.01em', position: 'relative', top: -16,
          }}>+</span>
          <span className="display countup-a" style={{
            fontSize: 64, color: 'var(--green-600)',
          }}>24,80</span>
          <span style={{
            fontSize: 22, fontWeight: 600, color: 'var(--green-600)',
            letterSpacing: '-0.02em', marginLeft: 2,
          }}>€</span>
        </div>
        <div style={{ marginTop: 6, fontSize: 13, color: 'var(--mute)' }}>
          rispetto al budget di <strong className="tnum" style={{ color: 'var(--ink-2)' }}>175,00 €</strong> · giorno 5 di 7
        </div>

        {/* Linea progresso settimana con marker oggi */}
        <div style={{ marginTop: 16, position: 'relative' }}>
          <div style={{
            height: 6, borderRadius: 999, background: 'var(--line)',
            overflow: 'hidden',
          }}>
            <div className="bar-fill-a" style={{
              height: '100%', borderRadius: 999,
              background: 'linear-gradient(90deg, var(--green-400), var(--green-600))',
            }} />
          </div>
          <div className="today-marker" style={{
            position: 'absolute', top: -3, height: 12, width: 4, borderRadius: 4,
            background: 'var(--ink)',
          }} />
        </div>
      </section>

      {/* RING CARD — daily ring */}
      <section className="rise rise-2" style={{ padding: '0 16px' }}>
        <div className="press" style={{
          background: 'var(--card)', borderRadius: 24,
          padding: 18, boxShadow: 'var(--shadow-md)',
          display: 'flex', alignItems: 'center', gap: 18,
        }}>
          {/* Ring */}
          <div style={{ width: 132, height: 132, position: 'relative', flexShrink: 0 }}>
            <svg width="132" height="132" viewBox="0 0 132 132" style={{ transform: 'rotate(-90deg)' }}>
              <defs>
                <linearGradient id="ringGradA" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%"  stopColor="oklch(0.78 0.16 155)" />
                  <stop offset="100%" stopColor="oklch(0.50 0.13 155)" />
                </linearGradient>
              </defs>
              <circle cx="66" cy="66" r={R} fill="none" stroke="var(--line)" strokeWidth="12" />
              <circle
                className="ring-bar-a"
                cx="66" cy="66" r={R}
                fill="none"
                stroke="url(#ringGradA)"
                strokeWidth="12"
                strokeLinecap="round"
                strokeDasharray={C}
                strokeDashoffset={C}
                style={{ '--target': offset }}
              />
              {/* Marker dot at the end of the arc */}
              <circle className="ring-dot-a" cx="66" cy="10" r="6" fill="var(--green-600)" />
            </svg>
            <div style={{
              position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', textAlign: 'center',
            }}>
              <div>
                <div className="tnum" style={{
                  fontSize: 26, fontWeight: 700, letterSpacing: '-0.03em', lineHeight: 1,
                }}>
                  <span className="countup-a-day">12,40</span><span style={{ fontSize: 16 }}> €</span>
                </div>
                <div className="meta" style={{ marginTop: 4, fontSize: 11 }}>rimangono oggi</div>
              </div>
            </div>
          </div>

          {/* Stat column */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 14, minWidth: 0 }}>
            <div>
              <div className="eyebrow" style={{ fontSize: 10, marginBottom: 3 }}>Speso oggi</div>
              <div className="tnum" style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em' }}>
                12,60 €
              </div>
              <div className="meta" style={{ marginTop: 1 }}>su 25,00 €</div>
            </div>
            <div style={{ height: 1, background: 'var(--line-2)' }} />
            <div>
              <div className="eyebrow" style={{ fontSize: 10, marginBottom: 3 }}>Media settimana</div>
              <div className="tnum" style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em' }}>
                15,44 €
              </div>
              <div className="meta" style={{ marginTop: 1 }}>
                <span style={{ color: 'var(--good)' }}>−9,56 €</span> vs budget
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* WEEK STRIP */}
      <section className="rise rise-3" style={{ padding: '14px 16px 0' }}>
        <div style={{
          background: 'var(--card)', borderRadius: 24, padding: '16px 16px 14px',
          boxShadow: 'var(--shadow-md)',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
            <div className="h2">Andamento settimana</div>
            <div className="meta tnum">77,20 / 175 €</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8 }}>
            {WEEK.map((d, i) => {
              const pct = d.future ? 0 : Math.min(1, d.spent / d.budget);
              const overBudget = d.spent > d.budget;
              return (
                <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                  <div style={{
                    height: 64, width: 24, borderRadius: 10,
                    background: 'var(--line-2)', position: 'relative', overflow: 'hidden',
                    border: d.today ? '2px solid var(--green-600)' : '2px solid transparent',
                  }}>
                    <div className="bar-day-a" style={{
                      position: 'absolute', bottom: 0, left: 0, right: 0,
                      height: (pct * 100) + '%',
                      background: overBudget
                        ? 'linear-gradient(180deg, var(--bad), oklch(0.5 0.15 28))'
                        : d.future ? 'var(--mute-2)'
                        : d.today ? 'linear-gradient(180deg, var(--green-400), var(--green-600))'
                        : 'linear-gradient(180deg, var(--green-200), var(--green-400))',
                      borderRadius: '6px 6px 0 0',
                      ['--target-h']: (pct * 100) + '%',
                    }} />
                  </div>
                  <div style={{
                    fontSize: 11, fontWeight: d.today ? 700 : 500,
                    color: d.today ? 'var(--green-700)' : d.future ? 'var(--mute-2)' : 'var(--mute)',
                  }}>{d.d}</div>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      {/* SPESE OGGI */}
      <section className="rise rise-4" style={{ padding: '14px 16px 0' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', padding: '0 4px 6px' }}>
          <div className="h2">Spese di oggi</div>
          <span className="meta tnum">3 voci · 12,60 €</span>
        </div>
        <div style={{
          background: 'var(--card)', borderRadius: 20, padding: '4px 14px',
          boxShadow: 'var(--shadow-md)',
        }}>
          {TODAY_EXPENSES.map((e, i) => (
            <div key={e.id} style={{ borderBottom: i < TODAY_EXPENSES.length - 1 ? '1px solid var(--line-2)' : 0 }}>
              <ExpenseRow e={e} />
            </div>
          ))}
        </div>
      </section>

      {/* FAB */}
      <section className="rise rise-5" style={{ padding: '18px 16px 14px' }}>
        <FabAdd />
      </section>

      <div style={{ flex: 1 }} />
      <BottomNav />

      {/* Local CSS: keyframes for count-up, bar fill, ring fill */}
      <style>{`
        .countup-a {
          animation: countA 1.2s var(--ease-out-quart) both;
          animation-delay: .15s;
        }
        @keyframes countA {
          from { --num: 0; }
          to   { --num: 24.80; }
        }
        .countup-a::after { content: ""; }

        .ring-bar-a {
          animation: ringA 1.4s var(--ease-out-quart) both;
          animation-delay: .25s;
        }
        @keyframes ringA {
          to { stroke-dashoffset: var(--target); }
        }
        .ring-dot-a {
          transform-origin: 66px 66px;
          animation: dotA 1.4s var(--ease-out-quart) both;
          animation-delay: .25s;
        }
        @keyframes dotA {
          from { transform: rotate(0deg); }
          to   { transform: rotate(${pct * 360}deg); }
        }

        .bar-fill-a {
          width: 0;
          animation: barA 1.1s var(--ease-out-quart) both;
          animation-delay: .35s;
        }
        @keyframes barA {
          to { width: ${(5/7 * 100).toFixed(1)}%; }
        }

        .today-marker {
          left: 0; opacity: 0;
          animation: markA .7s var(--ease-out-quart) both;
          animation-delay: 1.0s;
        }
        @keyframes markA {
          from { left: 0; opacity: 0; }
          to   { left: ${(5/7 * 100 - 0.5).toFixed(1)}%; opacity: 1; }
        }

        .bar-day-a {
          transform-origin: bottom;
          animation: dayBarA .8s var(--ease-out-quart) both;
          animation-delay: .5s;
        }
        @keyframes dayBarA {
          from { transform: scaleY(0); }
          to   { transform: scaleY(1); }
        }
      `}</style>
    </div>
  );
}

window.VariantA = VariantA;

</script>
<script type="text/babel">
window.PTR = function(){ return null; };
const { VariantA } = window;
ReactDOM.createRoot(document.getElementById("root")).render(<VariantA palette="green" />);
window.__appReady = true;
</script>
<script>
(function(){
  var start = Date.now();
  function tick(){
    if (window.__appReady && (Date.now() - start) > 1500){
      var s = document.getElementById("splash");
      if (s){ s.classList.add("hide"); setTimeout(function(){ s && s.remove(); }, 600); }
      return;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
<script>
/* Registra il service worker — necessario per "Installa app" e per l'avvio a tutto schermo */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
